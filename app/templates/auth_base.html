<head>
    <meta charset="UTF-8">
    <title>{% block title %}Auth{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#355867'
            }
          }
        }
      }
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">

        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-primary">SmartCaisse</h1>
            <p class="text-gray-600">{% block auth_title %}{% endblock %}</p>
        </div>

        <div class="bg-white shadow-lg rounded-2xl p-8">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message mb-4 p-3 rounded-xl text-sm font-semibold transform transition-all duration-500
                            {% if category == 'danger' or category == 'error' %}
                                bg-red-100 text-red-700 border border-red-200
                            {% else %}
                                bg-green-100 text-green-700 border border-green-200
                            {% endif %}
                        ">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %} 
            {% endwith %}

            {% block content %}{% endblock %}

        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const alerts = document.querySelectorAll('.flash-message');
            
            alerts.forEach(function(alert) {
                alert.style.transition = 'all 0.5s ease-out';
                
                setTimeout(function() {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    
                    setTimeout(function() {
                        alert.remove();
                    }, 500); 
                }, 2000); // Reste visible 2 secondes
            });
        });
    </script>
</body>
